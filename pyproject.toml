[project]
name = "acid-practice-python"
version = "0.1.0"
description = ""
authors = [
    {name = "rupchella",email = "rupasova19955@gmail.com\""}
]
requires-python = "^3.14"
dependencies = [
    "fastapi (>=0.139.0,<0.140.0)",
    "uvicorn[standard] (>=0.50.2,<0.51.0)",
    "psycopg[binary,pool] (>=3.3.4,<4.0.0)",
