services:
  db:
    image: postgres:16
    container_name: acid_practice_db
    environment:
      POSTGRES_DB: acid_practice
      POSTGRES_USER: acid_user
      POSTGRES_PASSWORD: acid_password
    ports:
      - "5432:5432"
    volumes:
      - acid_practice_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acid_user -d acid_practice"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:16
    container_name: acid_practice_test_db
    environment:
      POSTGRES_DB: acid_practice_test
      POSTGRES_USER: acid_user
      POSTGRES_PASSWORD: acid_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acid_user -d acid_practice_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  acid_practice_pg_data: